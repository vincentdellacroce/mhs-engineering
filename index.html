<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bruin Coffee | Artisanal Fluid Experience</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;500&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    :root {
      --color-espresso: #120a06;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--color-espresso);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="relative select-none text-white overflow-hidden w-full h-full">

  <canvas id="webgl-canvas" class="absolute inset-0 w-full h-full z-0 block pointer-events-auto touch-none"></canvas>

  <svg class="pointer-events-none fixed inset-0 w-full h-full z-50 opacity-[0.025] mix-blend-overlay">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>

  <main class="absolute inset-0 z-10 flex flex-col justify-between p-8 md:p-16 xl:p-24 pointer-events-none mix-blend-difference">
    <header class="w-full flex justify-between items-start">
      <div class="flex flex-col gap-1">
        <span class="text-xs tracking-[0.3em] uppercase font-semibold text-neutral-400">Concept No. 04</span>
        <span class="text-sm font-light text-neutral-200">Bruin Atelier</span>
      </div>
      <nav class="hidden md:flex gap-12 text-sm font-medium tracking-widest uppercase text-neutral-300">
        <span>Origin</span>
        <span>The Roasts</span>
        <span>Experience</span>
      </nav>
      <button class="pointer-events-auto border border-white/20 px-5 py-2 text-xs tracking-widest uppercase rounded-full bg-white/5 backdrop-blur-md hover:bg-white hover:text-black transition-all duration-500 ease-out">
        Reserve
      </button>
    </header>

    <section class="w-full flex flex-col items-center justify-center flex-grow py-32">
      <div class="text-center opacity-0 pointer-events-none">
        <h1 class="text-[clamp(2.8rem,9vw,11rem)]">Bruin Coffee</h1>
      </div>
    </section>

    <footer class="w-full grid grid-cols-2 md:grid-cols-3 items-end text-neutral-400 text-xs tracking-wider">
      <div class="flex flex-col gap-2">
        <span class="font-mono text-[10px] text-neutral-500">// INTEGRATED RENDER ENGINE</span>
        <span id="fps-display" class="font-mono">Initializing Pipeline...</span>
      </div>
      <div class="hidden md:block text-center italic font-['Playfair_Display'] text-neutral-300 text-base">
        "Refinement through physics."
      </div>
      <div class="text-right flex flex-col gap-1 items-end">
        <span class="uppercase tracking-[0.2em] font-semibold text-neutral-200">Interact</span>
        <span class="text-[11px] text-neutral-500">Move cursor across typography to refract</span>
      </div>
    </footer>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    const vertexShaderSource = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `;

    const simulationFragmentShaderSource = `
      uniform vec2 u_resolution;
      uniform float u_mouse_force;
      uniform vec2 u_mouse_pos; 
      uniform sampler2D u_current_frame;
      uniform sampler2D u_prev_frame;
      varying vec2 vUv;

      void main() {
        vec2 uv = vUv;
        vec2 texel = vec2(1.0) / u_resolution;

        float left  = texture2D(u_current_frame, uv + vec2(-texel.x, 0.0)).r;
        float right = texture2D(u_current_frame, uv + vec2(texel.x, 0.0)).r;
        float top   = texture2D(u_current_frame, uv + vec2(0.0, texel.y)).r;
        float bottom= texture2D(u_current_frame, uv + vec2(0.0, -texel.y)).r;

        float prevHeight = texture2D(u_prev_frame, uv).r;
        float nextHeight = (left + right + top + bottom) * 0.5 - prevHeight;
        
        nextHeight *= 0.982; 

        if (u_mouse_force > 0.0) {
          float dist = distance(uv * u_resolution, u_mouse_pos * u_resolution);
          float influence = smoothstep(45.0, 0.0, dist);
          nextHeight += influence * u_mouse_force * 0.7;
        }

        gl_FragColor = vec4(clamp(nextHeight, -5.0, 5.0), 0.0, 0.0, 1.0);
      }
    `;

    const renderFragmentShaderSource = `
      uniform vec2 u_resolution;
      uniform sampler2D u_buffer;
      uniform sampler2D u_text_texture;
      varying vec2 vUv;

      void main() {
        vec2 uv = vUv;
        vec2 texel = vec2(1.0) / u_resolution;

        float hl = texture2D(u_buffer, uv + vec2(-texel.x, 0.0)).r;
        float hr = texture2D(u_buffer, uv + vec2(texel.x, 0.0)).r;
        float ht = texture2D(u_buffer, uv + vec2(0.0, texel.y)).r;
        float hb = texture2D(u_buffer, uv + vec2(0.0, -texel.y)).r;

        // Extract surface slope vectors
        vec3 normal = normalize(vec3((hl - hr) * 4.0, (hb - ht) * 4.0, 1.0));

        // Base Liquid Tones
        vec3 baseEspresso = vec3(0.063, 0.035, 0.018);
        vec3 darkRoast    = vec3(0.184, 0.114, 0.067);
        
        // Define clean refraction offset multiplier
        vec2 distortion = normal.xy * 0.035;

        // Chromatic Aberration Pipeline (Sampling fluid levels)
        float rHeight = texture2D(u_buffer, uv + distortion * 1.10).r;
        float gHeight = texture2D(u_buffer, uv + distortion * 1.00).r;
        float bHeight = texture2D(u_buffer, uv + distortion * 0.90).r;
        float combinedHeight = (rHeight + gHeight + bHeight) / 3.0;

        // Sample text texture using matching distortion coordinates to force liquid warping
        float textR = texture2D(u_text_texture, uv + distortion * 1.06).r;
        float textG = texture2D(u_text_texture, uv + distortion * 1.00).r;
        float textB = texture2D(u_text_texture, uv + distortion * 0.94).r;
        vec3 textSample = vec3(textR, textG, textB);

        // Mix liquid core map
        vec3 liquidColor = mix(baseEspresso, darkRoast, clamp(combinedHeight * 2.5, 0.0, 1.0));

        // Composite typography mask seamlessly onto coffee background mix
        vec3 textToneColor = vec3(0.98, 0.96, 0.93); // Solid premium off-white lettering tone
        vec3 compositeBase = mix(liquidColor, textToneColor, textSample);

        // Subtly lift chromatic edge glow effects within text fields based on movement velocity
        compositeBase.r += textR * clamp(rHeight * 0.15, 0.0, 0.08);
        compositeBase.b += textB * clamp(bHeight * 0.12, 0.0, 0.06);

        // Specular Lighting Pass (Blinn-Phong)
        vec3 lightDir = normalize(vec3(0.15, 0.45, 0.75));
        vec3 viewDir  = vec3(0.0, 0.0, 1.0);
        vec3 halfDir  = normalize(lightDir + viewDir);
        float specularIntensity = pow(max(dot(normal, halfDir), 0.0), 50.0);
        vec3 specularColor = vec3(0.96, 0.91, 0.84) * specularIntensity * 0.75;

        gl_FragColor = vec4(compositeBase + specularColor, 1.0);
      }
    `;

    class FluidSimulationEngine {
      constructor() {
        this.canvas = document.getElementById('webgl-canvas');
        this.fpsDisplay = document.getElementById('fps-display');
        
        this.mouse = { x: 0.5, y: 0.5, prevX: 0.5, prevY: 0.5, targetX: 0.5, targetY: 0.5 };
        this.pointerForce = 0.0;
        this.hasMoved = false;
        
        this.lastTime = performance.now();
        this.frameCount = 0;

        // Pre-create dynamic text assets before spinning up WebGL configurations
        this.createTextTexture();
        this.initEngine();
      }

      createTextTexture() {
        // Build isolated dynamic offscreen canvas to render text directly to WebGL texture pipeline
        this.textCanvas = document.createElement('canvas');
        this.textCtx = this.textCanvas.getContext('2d');
        this.updateTextCanvasSize();
      }

      updateTextCanvasSize() {
        const ratio = Math.min(window.devicePixelRatio, 2);
        this.textCanvas.width = window.innerWidth * ratio;
        this.textCanvas.height = window.innerHeight * ratio;

        const ctx = this.textCtx;
        ctx.clearRect(0, 0, this.textCanvas.width, this.textCanvas.height);
        
        // Match responsive scale attributes matching viewport width
        const baseSize = window.innerWidth;
        let fontSize = baseSize * 0.09; // Fluid scale percentage match
        if (fontSize < 46) fontSize = 46;
        if (fontSize > 165) fontSize = 165;
        fontSize = fontSize * ratio;

        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, this.textCanvas.width, this.textCanvas.height);

        // Render typography text exactly dead-center on our offscreen canvas
        ctx.font = `400 ${fontSize}px 'Playfair Display', serif`;
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.letterSpacing = "-0.02em";
        
        ctx.fillText("Bruin Coffee", this.textCanvas.width / 2, this.textCanvas.height / 2);

        // If ThreeJS texture loop has been mounted, flag direct allocation update properties
        if (this.textTexture) {
          this.textTexture.needsUpdate = true;
        }
      }

      initEngine() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        
        this.renderer = new THREE.WebGLRenderer({
          canvas: this.canvas,
          antialias: false,
          powerPreference: "high-performance"
        });
        
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        const ratio = Math.min(window.devicePixelRatio, 2);
        this.renderer.setPixelRatio(ratio);

        this.width = Math.floor(window.innerWidth * ratio);
        this.height = Math.floor(window.innerHeight * ratio);

        const gl = this.renderer.getContext();
        let textureType = THREE.FloatType;
        if (!gl.getExtension('OES_texture_float') || !gl.getExtension('OES_texture_float_linear')) {
          textureType = THREE.HalfFloatType;
        }

        const targetOptions = {
          minFilter: THREE.LinearFilter,
          magFilter: THREE.LinearFilter,
          format: THREE.RGBAFormat,
          type: textureType,
          depthBuffer: false,
          stencilBuffer: false,
        };

        this.bufferA = new THREE.WebGLRenderTarget(this.width, this.height, targetOptions);
        this.bufferB = new THREE.WebGLRenderTarget(this.width, this.height, targetOptions);
        this.bufferC = new THREE.WebGLRenderTarget(this.width, this.height, targetOptions);

        // Wrap offscreen context output into native WebGL texture maps
        this.textTexture = new THREE.CanvasTexture(this.textCanvas);
        this.textTexture.minFilter = THREE.LinearFilter;
        this.textTexture.magFilter = THREE.LinearFilter;

        this.simulationMaterial = new THREE.ShaderMaterial({
          vertexShader: vertexShaderSource,
          fragmentShader: simulationFragmentShaderSource,
          uniforms: {
            u_resolution: { value: new THREE.Vector2(this.width, this.height) },
            u_current_frame: { value: null },
            u_prev_frame: { value: null },
            u_mouse_pos: { value: new THREE.Vector2(0.5, 0.5) },
            u_mouse_force: { value: 0.0 }
          }
        });

        this.renderMaterial = new THREE.ShaderMaterial({
          vertexShader: vertexShaderSource,
          fragmentShader: renderFragmentShaderSource,
          uniforms: {
            u_resolution: { value: new THREE.Vector2(this.width, this.height) },
            u_buffer: { value: null },
            u_text_texture: { value: this.textTexture }
          }
        });

        this.geometry = new THREE.PlaneGeometry(2, 2);
        this.mesh = new THREE.Mesh(this.geometry, this.simulationMaterial);
        this.scene.add(this.mesh);

        this.setupEventListeners();
        this.tick();
      }

      setupEventListeners() {
        const updateCoords = (x, y) => {
          this.mouse.targetX = (x / window.innerWidth) * this.width;
          this.mouse.targetY = (1.0 - (y / window.innerHeight)) * this.height;
          
          if (!this.hasMoved) {
            this.mouse.x = this.mouse.targetX;
            this.mouse.y = this.mouse.targetY;
            this.mouse.prevX = this.mouse.targetX;
            this.mouse.prevY = this.mouse.targetY;
            this.hasMoved = true;
          }
        };

        this.canvas.addEventListener('mousemove', (e) => updateCoords(e.clientX, e.clientY));
        this.canvas.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) updateCoords(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        window.addEventListener('resize', () => {
          const r = Math.min(window.devicePixelRatio, 2);
          
          // Re-render text canvas bounds to maintain clean typographical rendering vectors
          this.updateTextCanvasSize();

          this.renderer.setSize(window.innerWidth, window.innerHeight);
          this.width = Math.floor(window.innerWidth * r);
          this.height = Math.floor(window.innerHeight * r);

          this.bufferA.setSize(this.width, this.height);
          this.bufferB.setSize(this.width, this.height);
          this.bufferC.setSize(this.width, this.height);

          this.simulationMaterial.uniforms.u_resolution.value.set(this.width, this.height);
          this.renderMaterial.uniforms.u_resolution.value.set(this.width, this.height);
        });
      }

      tick() {
        requestAnimationFrame(() => this.tick());

        this.frameCount++;
        const now = performance.now();
        if (now >= this.lastTime + 1000) {
          this.fpsDisplay.innerText = `${((this.frameCount * 1000) / (now - this.lastTime)).toFixed(1)} FPS // OPERATIONAL`;
          this.frameCount = 0;
          this.lastTime = now;
        }

        // Structural cursor tracking logic
        this.mouse.x += (this.mouse.targetX - this.mouse.x) * 0.16;
        this.mouse.y += (this.mouse.targetY - this.mouse.y) * 0.16;

        const dx = this.mouse.x - this.mouse.prevX;
        const dy = this.mouse.y - this.mouse.prevY;
        const velocity = Math.sqrt(dx * dx + dy * dy);
        
        this.pointerForce = this.hasMoved ? Math.min(velocity * 0.18, 2.8) : 0.0;

        // Execution Step 1: Physics Propagation Loop
        this.mesh.material = this.simulationMaterial;
        this.simulationMaterial.uniforms.u_mouse_pos.value.set(this.mouse.x / this.width, this.mouse.y / this.height);
        this.simulationMaterial.uniforms.u_mouse_force.value = this.pointerForce;
        this.simulationMaterial.uniforms.u_current_frame.value = this.bufferA.texture;
        this.simulationMaterial.uniforms.u_prev_frame.value = this.bufferB.texture;

        this.renderer.setRenderTarget(this.bufferC);
        this.renderer.render(this.scene, this.camera);

        // Execution Step 2: Spatial Layout Composed Visual Output
        this.mesh.material = this.renderMaterial;
        this.renderMaterial.uniforms.u_buffer.value = this.bufferC.texture;

        this.renderer.setRenderTarget(null);
        this.renderer.render(this.scene, this.camera);

        this.mouse.prevX = this.mouse.x;
        this.mouse.prevY = this.mouse.y;

        // Execution Step 3: Shift memory textures pointers
        const temp = this.bufferB;
        this.bufferB = this.bufferA;
        this.bufferA = this.bufferC;
        this.bufferC = temp;
      }
    }

    // Ensure all typography sets have cleanly downloaded from Google Servers before initialization
    window.addEventListener('load', () => {
      // Small timeout ensures fonts are mapped in browser memory before canvas draws text metrics
      setTimeout(() => {
        new FluidSimulationEngine();
      }, 250);
    });
  </script>
</body>
</html>
